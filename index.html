<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Checklist voyage</title>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.2/dist/pocketbase.umd.js"></script>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --text: #172033;
      --muted: #667085;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #168a4a;
      --green-soft: #e7f7ee;
      --red: #dc2626;
      --red-soft: #fee2e2;
      --amber: #b7791f;
      --amber-soft: #fff7df;
      --shadow: 0 12px 30px rgba(15, 23, 42, .08);
      --radius: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(244, 245, 247, .92) 280px),
        var(--bg);
    }

    .shell {
      width: min(100%, 760px);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(15, 23, 42, .02);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 10px 14px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--blue);
      color: white;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .brand-title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .headline-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      min-width: 0;
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 21px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: .74rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.blue {
      border-color: #bfd2ff;
      background: var(--blue-soft);
      color: #1e4fc0;
    }

    .badge.green {
      border-color: #b9e9c9;
      background: var(--green-soft);
      color: var(--green);
    }

    .badge.red {
      border-color: #fecaca;
      background: var(--red-soft);
      color: var(--red);
    }

    .badge.amber {
      border-color: #fde68a;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      display: inline-grid;
      place-items: center;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .icon-btn:active,
    .btn:active,
    .tab:active,
    .chip:active {
      transform: translateY(1px);
    }

    .content {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 14px 14px calc(24px + var(--safe-bottom));
    }

    .section {
      margin-bottom: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-pad {
      padding: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toolbar-title {
      min-width: 0;
    }

    .toolbar-title h2,
    .card-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
      font-weight: 820;
    }

    .toolbar-title p,
    .muted {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.35;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .date-grid {
      grid-template-columns: 1fr 1fr;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 750;
    }

    input,
    select,
    textarea {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--line-strong);
      background: white;
      color: var(--text);
      min-height: 42px;
      padding: 9px 11px;
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
    }

    .btn {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      background: var(--text);
      font-weight: 800;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn.blue {
      background: var(--blue);
    }

    .btn.green {
      background: var(--green);
    }

    .btn.red {
      background: var(--red);
    }

    .btn.ghost {
      background: white;
      color: var(--text);
      border-color: var(--line);
    }

    .btn.soft-blue {
      background: var(--blue-soft);
      color: #1e4fc0;
      border-color: #bfd2ff;
    }

    .btn.soft-red {
      background: var(--red-soft);
      color: var(--red);
      border-color: #fecaca;
    }

    .btn.full {
      width: 100%;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .voyage-card {
      padding: 13px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: white;
      display: grid;
      gap: 12px;
    }

    .voyage-card.active {
      border-color: #a9c2ff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .10);
    }

    .add-card {
      min-height: 92px;
      border: 1px dashed #a9b4c4;
      background: #fbfcfe;
      color: var(--text);
      align-items: center;
      justify-items: center;
      text-align: center;
    }

    .add-card .plus {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      font-size: 1.8rem;
      line-height: 1;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .voyage-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .voyage-name {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 820;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .voyage-meta {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf0f4;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width .25s ease;
    }

    .category {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      overflow: hidden;
    }

    .category-head {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      background: white;
      color: var(--text);
      text-align: left;
      border-bottom: 1px solid transparent;
    }

    .category.open .category-head {
      border-bottom-color: var(--line);
      background: var(--panel-soft);
    }

    .category-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chevron {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: #eef2f7;
      color: var(--muted);
      font-size: .8rem;
      flex: 0 0 auto;
    }

    .category-name {
      font-size: .98rem;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .category-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .category-body {
      display: none;
      padding: 10px;
    }

    .category.open .category-body {
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 7px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: white;
    }

    .check {
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      border: 1px solid var(--line-strong);
      background: white;
      color: transparent;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .item.done .check {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .item-label {
      min-width: 0;
      font-weight: 730;
      overflow-wrap: anywhere;
    }

    .item.done .item-label {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
    }

    .qty button {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .qty input {
      width: 42px;
      min-height: 28px;
      height: 28px;
      padding: 0 4px;
      text-align: center;
      border: 0;
      background: transparent;
      font-weight: 800;
    }

    .mini-actions {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini {
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border-radius: 6px;
      display: inline-grid;
      place-items: center;
      background: white;
      color: var(--muted);
      border: 1px solid var(--line);
      font-weight: 850;
    }

    .mini.red {
      background: var(--red-soft);
      color: var(--red);
      border-color: #fecaca;
    }

    .mini.blue {
      background: var(--blue-soft);
      color: #1e4fc0;
      border-color: #bfd2ff;
    }

    .add-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 2px;
    }

    .empty {
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty h2 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 1.15rem;
    }

    .code-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius);
      background: #111827;
      color: white;
    }

    .code {
      font-size: clamp(1.7rem, 10vw, 2.5rem);
      font-weight: 900;
      letter-spacing: .08em;
      line-height: 1;
    }

    .notice {
      padding: 11px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      line-height: 1.4;
      font-size: .92rem;
    }

    .notice.blue {
      border-color: #bfd2ff;
      background: var(--blue-soft);
      color: #1e4fc0;
    }

    .notice.green {
      border-color: #b9e9c9;
      background: var(--green-soft);
      color: var(--green);
    }

    .notice.red {
      border-color: #fecaca;
      background: var(--red-soft);
      color: var(--red);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(15, 23, 42, .32);
    }

    .sheet-backdrop.open {
      display: flex;
    }

    .sheet {
      width: min(100%, 560px);
      max-height: calc(100dvh - 36px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(15, 23, 42, .24);
      padding: 14px;
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 1.12rem;
    }

    .status {
      min-width: 34px;
      text-align: right;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 750;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 720px) {
      .shell {
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
      }

      .content {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (max-width: 420px) {
      .topbar-inner {
        padding-left: 10px;
        padding-right: 10px;
      }

      .content {
        padding-left: 10px;
        padding-right: 10px;
      }

      .item {
        grid-template-columns: 34px 1fr;
      }

      .date-grid {
        grid-template-columns: 1fr;
      }

      .item .mini-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
        padding-left: 43px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">✓</div>
            <div class="brand-title">
              <h1>Checklist voyage <span class="badge blue">v08</span></h1>
              <div class="headline-meta" id="headerMeta">Préparez vos sacs sans prise de tête</div>
            </div>
          </div>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <div class="sheet-backdrop" id="voyageSheet" onclick="closeSheetOnBackdrop(event, 'voyageSheet')">
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="voyageSheetTitle">
      <div class="sheet-head">
        <h2 id="voyageSheetTitle">Nouveau voyage</h2>
        <button class="icon-btn" type="button" onclick="closeSheet('voyageSheet')" title="Fermer">×</button>
      </div>
      <form class="grid section" onsubmit="createVoyage(event)">
        <div class="field">
          <label for="voyageLocation">Lieu</label>
          <input id="voyageLocation" name="location" autocomplete="off" placeholder="Ex. Bretagne, Espagne, ski...">
        </div>
        <div class="grid date-grid">
          <div class="field">
            <label for="voyageStartDate">Départ</label>
            <input id="voyageStartDate" name="startDate" type="date">
          </div>
          <div class="field">
            <label for="voyageEndDate">Retour</label>
            <input id="voyageEndDate" name="endDate" type="date">
          </div>
        </div>
        <div class="button-row">
          <button class="btn blue full" type="submit">Créer</button>
        </div>
      </form>
      <div class="notice blue section">ou</div>
      <form class="grid" onsubmit="joinVoyage(event)">
        <div class="field">
          <label for="sheetJoinCode">Ajouter un voyage via un code</label>
          <input id="sheetJoinCode" autocomplete="off" inputmode="text" maxlength="8" placeholder="Code du voyage">
        </div>
        <button class="btn green full" type="submit">Ajouter ce voyage</button>
      </form>
    </section>
  </div>

  <script>
    const VERSION = "v08";
    const STORAGE_KEY = "checklist-voyage-state-v2";
    const OLD_STORAGE_KEY = "travelChecklistState";
    const PB_URL = "https://psyco.fly.dev";
    const PB_COLLECTION = "travel_checklists";

    let pb = null;
    let unsubscribeCurrent = null;
    let syncTimer = null;
    let pendingRemoteVoyage = null;
    let statusText = "Local";

    const state = {
      tab: "voyages",
      voyages: [],
      currentVoyageId: null,
      openCats: {}
    };

    const defaultCategories = [
      {
        name: "Documents",
        items: [
          { name: "Passeports / cartes d'identité", qty: 1 },
          { name: "Billets et réservations", qty: 1 },
          { name: "Permis / assurance", qty: 1 }
        ]
      },
      {
        name: "Vêtements",
        items: [
          { name: "Sous-vêtements", qty: 1 },
          { name: "T-shirts", qty: 1 },
          { name: "Tenue chaude", qty: 1 }
        ]
      },
      {
        name: "Toilette",
        items: [
          { name: "Brosse à dents", qty: 1 },
          { name: "Dentifrice", qty: 1 },
          { name: "Trousse de toilette", qty: 1 }
        ]
      }
    ];

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function generateCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 6; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    function cleanCode(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
    }

    function normalizeQty(value) {
      const number = Number.parseInt(value, 10);
      if (!Number.isFinite(number) || number < 1) return 1;
      return Math.min(number, 99);
    }

    function isUserEditing() {
      const el = document.activeElement;
      return el && ["INPUT", "TEXTAREA", "SELECT"].includes(el.tagName);
    }

    function getPB() {
      if (pb || typeof PocketBase === "undefined") return pb;
      pb = new PocketBase(PB_URL);
      pb.autoCancellation(false);
      return pb;
    }

    function currentVoyage() {
      return state.voyages.find(voyage => voyage.id === state.currentVoyageId) || state.voyages[0] || null;
    }

    function createDefaultCategories() {
      return defaultCategories.map(category => ({
        id: uid("cat"),
        name: category.name,
        items: category.items.map(item => ({
          id: uid("item"),
          name: item.name,
          qty: item.qty,
          done: false
        }))
      }));
    }

    function makeVoyage(name, date) {
      const voyage = {
        id: uid("voyage"),
        code: generateCode(),
        name: name || "Nouveau voyage",
        date: date || "",
        shared: false,
        remoteRecordId: "",
        categories: createDefaultCategories(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      voyage.categories.forEach(category => {
        state.openCats[category.id] = true;
      });
      return voyage;
    }

    function normalizeVoyage(raw) {
      const voyage = raw && typeof raw === "object" ? raw : {};
      const normalized = {
        id: voyage.id || uid("voyage"),
        code: cleanCode(voyage.code) || generateCode(),
        name: voyage.name || "Voyage",
        date: voyage.date || "",
        shared: Boolean(voyage.shared || voyage.remoteRecordId),
        remoteRecordId: voyage.remoteRecordId || "",
        createdAt: voyage.createdAt || new Date().toISOString(),
        updatedAt: voyage.updatedAt || new Date().toISOString(),
        categories: Array.isArray(voyage.categories) ? voyage.categories.map(normalizeCategory) : []
      };
      return normalized;
    }

    function normalizeCategory(raw) {
      const category = raw && typeof raw === "object" ? raw : {};
      return {
        id: category.id || uid("cat"),
        name: category.name || "Catégorie",
        items: Array.isArray(category.items) ? category.items.map(normalizeItem) : []
      };
    }

    function normalizeItem(raw) {
      const item = raw && typeof raw === "object" ? raw : {};
      return {
        id: item.id || uid("item"),
        name: item.name || "Élément",
        qty: normalizeQty(item.qty || 1),
        done: Boolean(item.done)
      };
    }

    function saveLocal() {
      const payload = {
        version: VERSION,
        currentVoyageId: state.currentVoyageId,
        voyages: state.voyages,
        openCats: state.openCats
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          state.voyages = Array.isArray(parsed.voyages) ? parsed.voyages.map(normalizeVoyage) : [];
          state.currentVoyageId = parsed.currentVoyageId || state.voyages[0]?.id || null;
          state.openCats = parsed.openCats && typeof parsed.openCats === "object" ? parsed.openCats : {};
          return;
        } catch (error) {
          console.warn("Impossible de charger le stockage v2", error);
        }
      }
      migrateOldLocalState();
    }

    function migrateOldLocalState() {
      const oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
      if (!oldRaw) return;
      try {
        const oldState = JSON.parse(oldRaw);
        const oldVoyages = Array.isArray(oldState.voyages) ? oldState.voyages : [];
        state.voyages = oldVoyages.map(voyage => normalizeVoyage({
          ...voyage,
          code: voyage.code || generateCode(),
          shared: false,
          remoteRecordId: ""
        }));
        state.currentVoyageId = state.voyages[0]?.id || null;
        saveLocal();
      } catch (error) {
        console.warn("Migration ancien stockage impossible", error);
      }
    }

    function progressForVoyage(voyage) {
      const items = voyage.categories.flatMap(category => category.items);
      const total = items.length;
      const done = items.filter(item => item.done).length;
      return {
        total,
        done,
        percent: total ? Math.round((done / total) * 100) : 0
      };
    }

    function progressForCategory(category) {
      const total = category.items.length;
      const done = category.items.filter(item => item.done).length;
      return {
        total,
        done,
        percent: total ? Math.round((done / total) * 100) : 0
      };
    }

    function setStatus(text) {
      statusText = text;
      const status = document.getElementById("headerMeta");
      const voyage = currentVoyage();
      if (status) {
        if (state.tab === "voyages") {
          const count = state.voyages.length;
          status.textContent = count ? `${count} voyage${count > 1 ? "s" : ""} enregistré${count > 1 ? "s" : ""}` : "Ajoutez votre premier voyage";
        } else {
          status.textContent = voyage ? `${voyage.name} · ${text}` : "Préparez vos sacs sans prise de tête";
        }
      }
    }

    function setTab(tab) {
      state.tab = tab;
      render();
      if (tab === "liste") {
        setTimeout(() => document.getElementById("content")?.scrollTo({ top: 0, behavior: "smooth" }), 0);
      }
    }

    function goHome() {
      state.tab = "voyages";
      saveLocal();
      render();
    }

    function openVoyageSheet() {
      document.getElementById("voyageLocation").value = "";
      document.getElementById("voyageStartDate").value = "";
      document.getElementById("voyageEndDate").value = "";
      document.getElementById("sheetJoinCode").value = "";
      document.getElementById("voyageSheet").classList.add("open");
      setTimeout(() => document.getElementById("voyageLocation").focus(), 50);
    }

    function closeSheet(id) {
      document.getElementById(id).classList.remove("open");
    }

    function closeSheetOnBackdrop(event, id) {
      if (event.target.id === id) closeSheet(id);
    }

    function createVoyage(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const name = form.elements.location.value.trim();
      const date = formatDateRange(form.elements.startDate.value, form.elements.endDate.value);
      const voyage = makeVoyage(name, date);
      state.voyages.unshift(voyage);
      state.currentVoyageId = voyage.id;
      state.tab = "liste";
      closeSheet("voyageSheet");
      saveAndSync(voyage, { immediate: true });
      render();
    }

    function formatDateRange(start, end) {
      const format = value => {
        if (!value) return "";
        const [year, month, day] = value.split("-");
        return `${day}/${month}/${year}`;
      };
      const startLabel = format(start);
      const endLabel = format(end);
      if (startLabel && endLabel) return startLabel === endLabel ? startLabel : `${startLabel} - ${endLabel}`;
      return startLabel || endLabel || "";
    }

    function selectVoyage(id) {
      state.currentVoyageId = id;
      state.tab = "liste";
      const voyage = currentVoyage();
      if (voyage) {
        voyage.categories.forEach(category => {
          if (state.openCats[category.id] === undefined) {
            state.openCats[category.id] = category.items.some(item => !item.done);
          }
        });
      }
      saveLocal();
      render();
      subscribeToCurrentVoyage();
    }

    function renameVoyage(id) {
      const voyage = state.voyages.find(item => item.id === id);
      if (!voyage) return;
      const value = prompt("Nouveau nom du voyage", voyage.name);
      if (value === null) return;
      const next = value.trim();
      if (!next) return;
      voyage.name = next;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function renameCurrentVoyage() {
      const voyage = currentVoyage();
      if (voyage) renameVoyage(voyage.id);
    }

    function deleteVoyage(id) {
      const voyage = state.voyages.find(item => item.id === id);
      if (!voyage) return;
      if (!confirm(`Supprimer le voyage "${voyage.name}" de cet appareil ?`)) return;
      state.voyages = state.voyages.filter(item => item.id !== id);
      if (state.currentVoyageId === id) state.currentVoyageId = state.voyages[0]?.id || null;
      saveLocal();
      render();
      subscribeToCurrentVoyage();
    }

    function addCategory() {
      const voyage = currentVoyage();
      if (!voyage) return;
      const value = prompt("Nom de la nouvelle catégorie", "À ajouter");
      if (value === null) return;
      const name = value.trim();
      if (!name) return;
      const category = { id: uid("cat"), name, items: [] };
      voyage.categories.push(category);
      state.openCats[category.id] = true;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function renameCategory(categoryId) {
      const voyage = currentVoyage();
      const category = voyage?.categories.find(item => item.id === categoryId);
      if (!category) return;
      const value = prompt("Nouveau nom de la catégorie", category.name);
      if (value === null) return;
      const name = value.trim();
      if (!name) return;
      category.name = name;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function deleteCategory(categoryId) {
      const voyage = currentVoyage();
      const category = voyage?.categories.find(item => item.id === categoryId);
      if (!voyage || !category) return;
      if (!confirm(`Supprimer la catégorie "${category.name}" ?`)) return;
      voyage.categories = voyage.categories.filter(item => item.id !== categoryId);
      delete state.openCats[categoryId];
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function toggleCategory(categoryId) {
      state.openCats[categoryId] = !state.openCats[categoryId];
      saveLocal();
      render();
    }

    function addItem(event, categoryId) {
      event.preventDefault();
      const voyage = currentVoyage();
      const category = voyage?.categories.find(item => item.id === categoryId);
      if (!voyage || !category) return;
      const input = event.currentTarget.querySelector("input");
      const name = input.value.trim();
      if (!name) return;
      category.items.push({ id: uid("item"), name, qty: 1, done: false });
      input.value = "";
      state.openCats[categoryId] = true;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function toggleItem(categoryId, itemId) {
      const voyage = currentVoyage();
      const item = voyage?.categories
        .find(category => category.id === categoryId)?.items
        .find(row => row.id === itemId);
      if (!voyage || !item) return;
      item.done = !item.done;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function renameItem(categoryId, itemId) {
      const voyage = currentVoyage();
      const item = voyage?.categories
        .find(category => category.id === categoryId)?.items
        .find(row => row.id === itemId);
      if (!voyage || !item) return;
      const value = prompt("Renommer l'élément", item.name);
      if (value === null) return;
      const name = value.trim();
      if (!name) return;
      item.name = name;
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function deleteItem(categoryId, itemId) {
      const voyage = currentVoyage();
      const category = voyage?.categories.find(item => item.id === categoryId);
      if (!voyage || !category) return;
      category.items = category.items.filter(item => item.id !== itemId);
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function changeQty(categoryId, itemId, deltaOrValue) {
      const voyage = currentVoyage();
      const item = voyage?.categories
        .find(category => category.id === categoryId)?.items
        .find(row => row.id === itemId);
      if (!voyage || !item) return;
      if (typeof deltaOrValue === "number") {
        item.qty = normalizeQty(item.qty + deltaOrValue);
      } else {
        item.qty = normalizeQty(deltaOrValue);
      }
      voyage.updatedAt = new Date().toISOString();
      saveAndSync(voyage);
      render();
    }

    function saveAndSync(voyage, options = {}) {
      saveLocal();
      if (syncTimer) clearTimeout(syncTimer);
      const delay = options.immediate ? 0 : 550;
      syncTimer = setTimeout(() => saveVoyageRemote(voyage), delay);
    }

    async function findRecordByCode(code) {
      const client = getPB();
      if (!client) throw new Error("PocketBase indisponible");
      return client.collection(PB_COLLECTION).getFirstListItem(`code = "${cleanCode(code)}"`, {
        requestKey: null
      });
    }

    function remotePayload(voyage) {
      return {
        ...voyage,
        shared: true,
        updatedAt: new Date().toISOString()
      };
    }

    async function saveVoyageRemote(voyage) {
      if (!voyage) return;
      const client = getPB();
      if (!client) {
        setStatus("Local");
        return;
      }
      try {
        setStatus("Synchronisation...");
        let record = null;
        if (voyage.remoteRecordId) {
          try {
            record = await client.collection(PB_COLLECTION).getOne(voyage.remoteRecordId, { requestKey: null });
          } catch (error) {
            record = null;
          }
        }
        if (!record) {
          try {
            record = await findRecordByCode(voyage.code);
          } catch (error) {
            record = null;
          }
        }
        const data = remotePayload(voyage);
        if (record) {
          record = await client.collection(PB_COLLECTION).update(record.id, {
            code: voyage.code,
            data
          }, { requestKey: null });
        } else {
          record = await client.collection(PB_COLLECTION).create({
            code: voyage.code,
            data
          }, { requestKey: null });
        }
        voyage.shared = true;
        voyage.remoteRecordId = record.id;
        saveLocal();
        setStatus("Partagé");
        subscribeToCurrentVoyage();
      } catch (error) {
        console.warn("Synchronisation impossible", error);
        setStatus("Local");
      }
    }

    async function subscribeToCurrentVoyage() {
      const voyage = currentVoyage();
      const client = getPB();
      if (unsubscribeCurrent) {
        try {
          unsubscribeCurrent();
        } catch (error) {
          console.warn("Désabonnement impossible", error);
        }
        unsubscribeCurrent = null;
      }
      if (!client || !voyage?.code) {
        setStatus(voyage?.shared ? "Partagé" : "Local");
        return;
      }
      try {
        let record = null;
        if (voyage.remoteRecordId) {
          try {
            record = await client.collection(PB_COLLECTION).getOne(voyage.remoteRecordId, { requestKey: null });
          } catch (error) {
            record = null;
          }
        }
        if (!record) record = await findRecordByCode(voyage.code);
        voyage.shared = true;
        voyage.remoteRecordId = record.id;
        saveLocal();
        unsubscribeCurrent = await client.collection(PB_COLLECTION).subscribe(record.id, event => {
          if (event.action !== "update" || !event.record?.data) return;
          receiveRemoteVoyage(event.record.data, event.record.id);
        }, { requestKey: null });
        setStatus("Partagé");
      } catch (error) {
        setStatus(voyage.shared ? "Partagé" : "Local");
      }
    }

    function receiveRemoteVoyage(remoteData, recordId) {
      const incoming = normalizeVoyage({
        ...(remoteData.voyage || remoteData),
        shared: true,
        remoteRecordId: recordId
      });
      if (isUserEditing()) {
        pendingRemoteVoyage = incoming;
        return;
      }
      applyRemoteVoyage(incoming);
    }

    function applyRemoteVoyage(incoming) {
      const index = state.voyages.findIndex(voyage => voyage.code === incoming.code || voyage.id === incoming.id);
      if (index >= 0) {
        const previousId = state.voyages[index].id;
        state.voyages[index] = { ...incoming, id: previousId };
        if (state.currentVoyageId === incoming.id) state.currentVoyageId = previousId;
      } else {
        state.voyages.unshift(incoming);
        state.currentVoyageId = incoming.id;
      }
      saveLocal();
      render();
    }

    function flushPendingRemoteVoyage() {
      if (!pendingRemoteVoyage || isUserEditing()) return;
      const incoming = pendingRemoteVoyage;
      pendingRemoteVoyage = null;
      applyRemoteVoyage(incoming);
    }

    async function joinVoyage(event) {
      event.preventDefault();
      const input = event.currentTarget.querySelector("input");
      const code = cleanCode(input.value);
      if (!code) return;
      try {
        setStatus("Recherche...");
        const record = await findRecordByCode(code);
        if (!record?.data) throw new Error("Voyage introuvable");
        const voyage = normalizeVoyage({
          ...(record.data.voyage || record.data),
          code,
          shared: true,
          remoteRecordId: record.id
        });
        const existingIndex = state.voyages.findIndex(item => item.code === voyage.code);
        if (existingIndex >= 0) {
          voyage.id = state.voyages[existingIndex].id;
          state.voyages[existingIndex] = voyage;
        } else {
          state.voyages.unshift(voyage);
        }
        state.currentVoyageId = voyage.id;
        state.tab = "liste";
        saveLocal();
        input.value = "";
        closeSheet("voyageSheet");
        render();
        subscribeToCurrentVoyage();
      } catch (error) {
        console.warn("Import impossible", error);
        alert("Je n'ai pas trouvé ce voyage. Vérifie le code, puis réessaie.");
        setStatus("Local");
      }
    }

    function copyCode(code) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(() => setStatus("Code copié"));
      } else {
        window.prompt("Code à copier", code);
      }
    }

    function render() {
      const voyage = currentVoyage();
      setStatus(voyage ? (voyage.shared ? "Partagé" : "Local") : "Local");

      if (!voyage && state.tab !== "voyages") state.tab = "voyages";

      if (state.tab === "liste") renderChecklist();
      else renderVoyages();
    }

    function renderVoyages() {
      const content = document.getElementById("content");
      if (!state.voyages.length) {
        content.innerHTML = `
          <section class="panel empty">
            <h2>Aucun voyage pour le moment</h2>
            <p>Ajoutez un voyage en le créant ou avec un code partagé.</p>
          </section>
          <button class="voyage-card add-card full" type="button" onclick="openVoyageSheet()">
            <span class="plus">+</span>
            <strong>Ajouter un voyage</strong>
          </button>
        `;
        return;
      }

      const cards = state.voyages.map(voyage => {
        const progress = progressForVoyage(voyage);
        const isCurrent = voyage.id === state.currentVoyageId;
        return `
          <article class="voyage-card ${isCurrent ? "active" : ""}">
            <div class="voyage-main">
              <div>
                <h2 class="voyage-name">${escapeHTML(voyage.name)}</h2>
                <div class="voyage-meta">
                  ${voyage.date ? `<span class="badge">${escapeHTML(voyage.date)}</span>` : ""}
                  <span class="badge ${voyage.shared ? "green" : "amber"}">${voyage.shared ? "Partagé" : "Local"}</span>
                  <span class="badge blue">${escapeHTML(voyage.code)}</span>
                </div>
              </div>
              <div class="status">${progress.percent}%</div>
            </div>
            <div class="progress" aria-hidden="true"><span style="width:${progress.percent}%"></span></div>
            <div class="button-row">
              <button class="btn blue" type="button" onclick="selectVoyage('${voyage.id}')">Ouvrir</button>
              <button class="btn ghost" type="button" onclick="renameVoyage('${voyage.id}')">Renommer</button>
              <button class="btn soft-red" type="button" onclick="deleteVoyage('${voyage.id}')">Supprimer</button>
            </div>
          </article>
        `;
      }).join("");

      content.innerHTML = `
        <section class="toolbar">
          <div class="toolbar-title">
            <h2>Voyages</h2>
            <p>Chaque voyage a maintenant son propre code de partage.</p>
          </div>
        </section>
        <section class="grid">
          ${cards}
          <button class="voyage-card add-card" type="button" onclick="openVoyageSheet()">
            <span class="plus">+</span>
            <strong>Ajouter un voyage</strong>
          </button>
        </section>
      `;
    }

    function renderChecklist() {
      const voyage = currentVoyage();
      const content = document.getElementById("content");
      if (!voyage) {
        renderVoyages();
        return;
      }
      const progress = progressForVoyage(voyage);
      const categories = voyage.categories.map(category => renderCategory(voyage, category)).join("");
      content.innerHTML = `
        <section class="section panel panel-pad">
          <div class="toolbar">
            <div class="toolbar-title">
              <h2>${escapeHTML(voyage.name)}</h2>
              <p>${progress.done}/${progress.total} éléments prêts${voyage.date ? ` · ${escapeHTML(voyage.date)}` : ""}</p>
            </div>
            <span class="badge ${voyage.shared ? "green" : "amber"}">${voyage.shared ? "Partagé" : "Local"}</span>
          </div>
          <div class="progress" aria-hidden="true"><span style="width:${progress.percent}%"></span></div>
          <div class="button-row" style="margin-top:12px">
            <button class="btn ghost" type="button" onclick="goHome()">Retour</button>
            <button class="btn ghost" type="button" onclick="renameCurrentVoyage()">Renommer</button>
            <button class="btn soft-blue" type="button" onclick="copyCode('${voyage.code}')">Code ${escapeHTML(voyage.code)}</button>
            <button class="btn green" type="button" onclick="addCategory()">Ajouter une catégorie</button>
          </div>
        </section>
        <section class="grid">
          ${categories || `<div class="panel empty"><h2>Liste vide</h2><p>Ajoutez une catégorie pour commencer.</p></div>`}
        </section>
        <section class="notice blue section" style="margin-top:14px">
          Code de partage de ce voyage : <strong>${escapeHTML(voyage.code)}</strong>
        </section>
      `;
    }

    function renderCategory(voyage, category) {
      const progress = progressForCategory(category);
      const open = state.openCats[category.id] !== false;
      const items = category.items.map(item => `
        <article class="item ${item.done ? "done" : ""}">
          <button class="check" type="button" onclick="toggleItem('${category.id}', '${item.id}')" title="Cocher">✓</button>
          <div class="item-label" onclick="toggleItem('${category.id}', '${item.id}')">${escapeHTML(item.name)}</div>
          <div class="mini-actions">
            <div class="qty" onclick="event.stopPropagation()">
              <button type="button" onclick="changeQty('${category.id}', '${item.id}', -1)" title="Diminuer">−</button>
              <input aria-label="Quantité" value="${escapeHTML(item.qty)}" inputmode="numeric" onchange="changeQty('${category.id}', '${item.id}', this.value)" onfocus="this.select()">
              <button type="button" onclick="changeQty('${category.id}', '${item.id}', 1)" title="Augmenter">+</button>
            </div>
            <button class="mini blue" type="button" onclick="renameItem('${category.id}', '${item.id}')" title="Renommer">✎</button>
            <button class="mini red" type="button" onclick="deleteItem('${category.id}', '${item.id}')" title="Supprimer">×</button>
          </div>
        </article>
      `).join("");

      return `
        <article class="category ${open ? "open" : ""}">
          <button class="category-head" type="button" onclick="toggleCategory('${category.id}')">
            <div class="category-title">
              <span class="chevron">${open ? "⌃" : "⌄"}</span>
              <span class="category-name">${escapeHTML(category.name)}</span>
            </div>
            <div class="category-actions" onclick="event.stopPropagation()">
              <span class="badge">${progress.done}/${progress.total}</span>
              <button class="mini blue" type="button" onclick="renameCategory('${category.id}')" title="Renommer">✎</button>
              <button class="mini red" type="button" onclick="deleteCategory('${category.id}')" title="Supprimer">×</button>
            </div>
          </button>
          <div class="category-body">
            ${items || `<div class="notice">Aucun élément dans cette catégorie.</div>`}
            <form class="add-item" onsubmit="addItem(event, '${category.id}')">
              <input autocomplete="off" placeholder="Ajouter un élément">
              <button class="btn blue" type="submit">Ajouter</button>
            </form>
          </div>
        </article>
      `;
    }

    function renderShare() {
      const voyage = currentVoyage();
      const content = document.getElementById("content");
      if (!voyage) {
        renderVoyages();
        return;
      }
      content.innerHTML = `
        <section class="panel panel-pad section">
          <div class="toolbar">
            <div class="toolbar-title">
              <h2>Partager ce voyage</h2>
              <p>Le code ci-dessous donne accès uniquement à "${escapeHTML(voyage.name)}".</p>
            </div>
            <span class="badge ${voyage.shared ? "green" : "amber"}">${voyage.shared ? "Partagé" : "Local"}</span>
          </div>
          <div class="code-box">
            <div>
              <div class="muted" style="color:#cbd5e1;margin:0 0 6px">Code du voyage</div>
              <div class="code">${escapeHTML(voyage.code)}</div>
            </div>
            <button class="btn ghost" type="button" onclick="copyCode('${voyage.code}')">Copier</button>
          </div>
          <div class="button-row" style="margin-top:12px">
            <button class="btn green" type="button" onclick="saveVoyageRemote(currentVoyage())">Synchroniser</button>
            <button class="btn ghost" type="button" onclick="setTab('liste')">Retour liste</button>
          </div>
        </section>

        <section class="panel panel-pad section">
          <form class="grid" onsubmit="joinVoyage(event)">
            <div class="field">
              <label for="joinCode">Ajouter un autre voyage partagé</label>
              <input id="joinCode" autocomplete="off" inputmode="text" maxlength="8" placeholder="Code du voyage">
            </div>
            <button class="btn blue full" type="submit">Ouvrir ce voyage</button>
          </form>
        </section>

        <section class="notice blue">
          Le partage se fait maintenant voyage par voyage. Votre liste locale peut contenir plusieurs voyages, mais chaque code ne synchronise qu'un seul voyage.
        </section>
      `;
    }

    document.addEventListener("focusout", () => {
      setTimeout(flushPendingRemoteVoyage, 120);
    });

    window.addEventListener("online", () => {
      const voyage = currentVoyage();
      if (voyage) saveVoyageRemote(voyage);
    });

    loadLocal();
    render();
    subscribeToCurrentVoyage();
  </script>
</body>
</html>
